worker_processes auto;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    upstream api_backend {
        server 127.0.0.1:8000;
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /static/ {
            alias /app/api/static/;
        }
    }
}
