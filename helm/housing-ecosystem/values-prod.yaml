global:
  appName: housing-ecosystem

api:
  image: your-registry/housing-api:prod
  replicas: 3
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

scheduler:
  image: your-registry/gis-scheduler:prod
  replicas: 1
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

ingress:
  enabled: true
  host: housing.yourdomain.com

config:
  LOG_LEVEL: "warn"

secrets:
  SLACK_WEBHOOK: ""
  EMAIL_SENDER: ""
  EMAIL_PASSWORD: ""
  EMAIL_RECIPIENT: ""
