global:
  appName: housing-ecosystem

api:
  image: your-registry/housing-api:staging
  replicas: 2
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "750m"
      memory: "768Mi"

scheduler:
  image: your-registry/gis-scheduler:staging
  replicas: 1
  resources:
    requests:
      cpu: "150m"
      memory: "192Mi"
    limits:
      cpu: "300m"
      memory: "384Mi"

ingress:
  enabled: true
  host: staging.housing.yourdomain.com

config:
  LOG_LEVEL: "debug"

secrets:
  SLACK_WEBHOOK: ""
  EMAIL_SENDER: ""
  EMAIL_PASSWORD: ""
  EMAIL_RECIPIENT: ""
