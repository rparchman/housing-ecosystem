on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-scheduler:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build Scheduler image
      run: |
        docker build -t ghcr.io/${{ github.repository_owner }}/housing-scheduler:${{ github.sha }} .

    - name: Push Scheduler image
      run: |
        docker push ghcr.io/${{ github.repository_owner }}/housing-scheduler:${{ github.sha }}
