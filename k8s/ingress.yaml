apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: housing-api-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: housing.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: housing-api-service
                port:
                  number: 80
